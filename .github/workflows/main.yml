name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
defaults:
  run:
    shell: bash

# Cancel any in-flight jobs for the same PR/branch so there's only one active
# at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Install Rust
      run: |
        rustup update stable
        rustup default stable
        rustup component add rustfmt
    - name: Format source code
      run: cargo fmt -- --check

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive

    - name: Install Rust Toolchain
      run: |
        rustup toolchain install 1.77.1
        rustup target add wasm32-wasi --toolchain 1.77.1
        rustup target add wasm32-wasi

    - uses: actions/setup-node@v2
      with:
        node-version: ${{matrix.node-version}}

    - name: Cache Rust dependencies
      uses: actions/cache@v3
      id: rust-build
      with:
        path: target
        key: engine-build-${{ hashFiles('Cargo.lock', 'crates/spidermonkey-embedding-splicer/src/**/*.rs') }}

    - name: Install NPM packages
      run: npm install

    - name: Get StarlingMonkey Commit
      id: starlingmonkey-commit
      run: echo "STARLINGMONKEY_HASH=$(git submodule status | head -c9 | tail -c8)" >> "$GITHUB_OUTPUT"

    - name: Cache StarlingMonkey
      uses: actions/cache@v3
      id: starlingmonkey-build-jit
      with:
        path: build-release
        key: engine-build-jit-${{ steps.starlingmonkey-commit.outputs.STARLINGMONKEY_HASH }}

    - name: Cache StarlingMonkey (Weval)
      uses: actions/cache@v3
      id: starlingmonkey-build-aot
      with:
        path: build-release-weval
        key: engine-build-aot-${{ steps.starlingmonkey-commit.outputs.STARLINGMONKEY_HASH }}

    - name: Build ComponentizeJS
      run: npm run build

    - name: Build Weval
      run: npm run build:weval

  test-jit:
    runs-on: ubuntu-latest
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - '20'
          - '22'
          - latest
    steps:
    - uses: actions/checkout@v2

    - uses: actions/setup-node@v2
      with:
        node-version: ${{matrix.node-version}}

    - name: Install NPM packages
      run: npm install

    - name: Restore StarlingMonkey from cache
      uses: actions/cache/restore@v3
      id: rust-build
      with:
        path: target
        key: engine-build-${{ hashFiles('Cargo.lock', 'crates/spidermonkey-embedding-splicer/src/**/*.rs') }}

    - name: Test
      run: npm run test

    - name: Cache Example build
      uses: actions/cache@v3
      with:
        path: example/target
        key: example-cargo-${{ hashFiles('example/src/main.rs', 'example/Cargo.lock', 'example/hello.wit') }}

    - name: Test Example
      run: cd example && npm run build && ./test.sh

  test-aot:
    runs-on: ubuntu-latest
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - '20'
          - '22'
          - latest
    env:
      ENABLE_AOT: "1"
    steps:
    - uses: actions/checkout@v2

    - uses: actions/setup-node@v2
      with:
        node-version: ${{matrix.node-version}}

    - name: Install NPM packages
      run: npm install

    - name: Restore StarlingMonkey (Weval) from cache
      uses: actions/cache/restore@v3
      id: rust-build
      with:
        path: target
        key: engine-build-${{ hashFiles('Cargo.lock', 'crates/spidermonkey-embedding-splicer/src/**/*.rs') }}

    - name: Test
      run: npm run test:weval

    - name: Cache Example build
      uses: actions/cache@v3
      with:
        path: example/target
        key: example-${{ hashFiles('example/src/main.rs', 'example/Cargo.lock', 'example/hello.wit') }}

    - name: Test Example
      run: cd example && npm run build && ./test.sh
